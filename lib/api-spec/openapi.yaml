openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: class
    description: Class information
  - name: members
    description: Class members
  - name: gallery
    description: Gallery photos
  - name: timeline
    description: Class timeline events
  - name: messages
    description: Guestbook messages
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /class-info:
    get:
      operationId: getClassInfo
      tags: [class]
      summary: Get class info
      responses:
        "200":
          description: Class info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassInfo"

  /members:
    get:
      operationId: listMembers
      tags: [members]
      summary: List all class members
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"

  /members/{id}:
    get:
      operationId: getMember
      tags: [members]
      summary: Get member detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Member detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberDetail"
        "404":
          description: Not found

  /gallery:
    get:
      operationId: listGallery
      tags: [gallery]
      summary: List gallery photos
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Gallery photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GalleryPhoto"

  /gallery/categories:
    get:
      operationId: listGalleryCategories
      tags: [gallery]
      summary: List gallery categories
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /timeline:
    get:
      operationId: listTimeline
      tags: [timeline]
      summary: List class timeline events
      responses:
        "200":
          description: Timeline events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimelineEvent"

  /messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: List guestbook messages
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: createMessage
      tags: [messages]
      summary: Post a guestbook message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewMessage"
      responses:
        "201":
          description: Message created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ClassInfo:
      type: object
      properties:
        className:
          type: string
        year:
          type: string
        motto:
          type: string
        heroImageUrl:
          type: string
        memberCount:
          type: integer
      required: [className, year, motto, memberCount]

    Member:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: string
        photoUrl:
          type: string
        quote:
          type: string
      required: [id, name, role]

    MemberDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: string
        photoUrl:
          type: string
        quote:
          type: string
        bio:
          type: string
        ambition:
          type: string
        bestMemory:
          type: string
        additionalPhotos:
          type: array
          items:
            type: string
      required: [id, name, role]

    GalleryPhoto:
      type: object
      properties:
        id:
          type: integer
        imageUrl:
          type: string
        caption:
          type: string
        category:
          type: string
        takenAt:
          type: string
      required: [id, imageUrl, category]

    TimelineEvent:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
        title:
          type: string
        description:
          type: string
        imageUrl:
          type: string
      required: [id, date, title, description]

    Message:
      type: object
      properties:
        id:
          type: integer
        authorName:
          type: string
        content:
          type: string
        createdAt:
          type: string
      required: [id, authorName, content, createdAt]

    NewMessage:
      type: object
      properties:
        authorName:
          type: string
        content:
          type: string
      required: [authorName, content]
