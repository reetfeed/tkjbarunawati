kind = "web"
previewPath = "/"
title = "Build with Tricia"
version = "1.0.0"
id = "artifacts/tricia-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21474

[services.development]
run = "pnpm --filter @workspace/tricia-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tricia-site", "run", "build" ]
publicDir = "artifacts/tricia-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21474"
BASE_PATH = "/"
