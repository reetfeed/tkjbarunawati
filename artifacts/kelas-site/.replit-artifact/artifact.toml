kind = "web"
previewPath = "/kelas/"
title = "Website Kelas"
version = "1.0.0"
id = "artifacts/kelas-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/kelas/" ]
localPort = 23253

[services.development]
run = "pnpm --filter @workspace/kelas-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kelas-site", "run", "build" ]
publicDir = "artifacts/kelas-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23253"
BASE_PATH = "/kelas/"
